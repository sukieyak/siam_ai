

global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres_exporter'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: "minio"
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets: ["minio:9000"]
  - job_name: "minio-bucket"
    metrics_path: /minio/v2/metrics/bucket
    scheme: http
    static_configs:
      - targets: ["minio:9000"]   
  - job_name: "airflow_statsd"
    static_configs:
      - targets: ["statsd_exporter:9102"]
  - job_name: 'airflow-exporter'
    metrics_path: /admin/metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'airflow-apiserver:8080' 

